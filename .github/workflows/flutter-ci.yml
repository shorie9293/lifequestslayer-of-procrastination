name: Flutter CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  flutter-ci:
    name: 'Flutter CI'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup local packages
        run: |
          mkdir -p ../../packages
          git clone --depth 1 https://github.com/shorie9293/takamagahara.git /tmp/takamagahara 2>/dev/null || \
            git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/shorie9293/takamagahara.git /tmp/takamagahara
          cp -r /tmp/takamagahara/packages/takamagahara_core ../../packages/
          cp -r /tmp/takamagahara/packages/takamagahara_ui ../../packages/
          rm -rf /tmp/takamagahara

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: 'stable'
          cache: true

      - name: Verify Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis (flutter analyze)
        run: flutter analyze --no-fatal-infos

      - name: Run tests (shard 1/3)
        run: flutter test --no-pub -j 2 test/domain/ test/features/guild/ test/features/kozuchi/ test/features/player/ test/features/shared/

      - name: Run tests (shard 2/3)
        run: flutter test --no-pub -j 1 test/features/battle/domain/ test/features/battle/presentation/ test/features/battle/viewmodels/ test/features/battle/battle_report_dialog_samurai_test.dart test/features/temple/ test/features/character_customization/ test/features/crossapp/ test/features/overview/ test/features/town/

      - name: Run tests (shard 3/3)
        run: flutter test --no-pub -j 1 test/game_view_model_test.dart test/player_test.dart test/task_test.dart test/reflection_test.dart test/battle_state_test.dart test/date_utils_test.dart test/debug_overdue_test.dart test/difficulty_estimator_test.dart test/di_injection_test.dart test/fatigue_service_test.dart test/game_themes_test.dart test/help_dialog_test.dart test/iap_service_test.dart test/m12_cancel_persistence_test.dart test/notification_service_test.dart test/quiz_service_test.dart test/rank_colors_test.dart test/settings_repository_test.dart test/streak_service_test.dart test/title_definition_test.dart test/title_service_test.dart test/widget_test.dart
